<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GravelExpedition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-login-custom d-flex justify-content-center align-items-center vh-100">
    
    <div class="card p-5 shadow-lg card-login-custom animacion-entrada" style="width: 100%; max-width: 420px; border-radius: 15px;">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--dark-bg);">BIENVENIDO</h2>
            <p class="text-muted">GravelExpedition Oaxaca</p>
        </div>

        <form action="app.html" class="needs-validation" novalidate>
            
            <div class="mb-3">
                <label for="usuario" class="form-label fw-bold">Usuario</label>
                <input type="text" class="form-control form-control-lg" id="usuario" placeholder="Ingresa tu Usuario" required>
                <div class="invalid-feedback">
                    Por favor, ingresa tu nombre de usuario.
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                <div class="invalid-feedback">
                    La contraseña es obligatoria para entrar.
                </div>
            </div>

            <button type="submit" class="btn btn-lg w-100 fw-bold text-white shadow-sm" style="background-color: var(--strava-orange);">Entrar a Rodar</button>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        // Este código de JavaScript intercepta el formulario antes de enviarlo
        // y revisa que todos los campos con "required" estén llenos.
        (() => {
            'use strict'
            // Selecciona todos los formularios que necesitan validación
            const forms = document.querySelectorAll('.needs-validation')

            // Crea un bucle sobre ellos y evita el envío si son inválidos
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault() // Detiene que te mande a app.html
                        event.stopPropagation() // Detiene otros eventos
                    }
                    // Agrega la clase que pone todo verde o rojo según corresponda
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
